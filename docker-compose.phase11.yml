version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  live-feed:
    build:
      context: ./live-feed
      dockerfile: Dockerfile
    ports:
      - "8200:8200"
    environment:
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  defence-orchestration:
    build:
      context: ./defence-orchestration
      dockerfile: Dockerfile
    ports:
      - "8300:8300"
    environment:
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy

  taxii-server:
    build:
      context: ./threat-intel
      dockerfile: Dockerfile
    ports:
      - "8400:8400"
    environment:
      - LOG_LEVEL=INFO

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-nail-ave-graph}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  knowledge-graph:
    build:
      context: ./knowledge-graph
      dockerfile: Dockerfile
    ports:
      - "8500:8500"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-nail-ave-graph}
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  redis-data:
  neo4j-data:
